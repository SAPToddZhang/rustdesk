name: Todd Patch (Android) + Tag

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream tag to base on (e.g. 1.4.5 or v1.4.5)"
        required: true
        default: "1.4.5"
      new_tag:
        description: "Tag to create in your fork to trigger build (recommend: 1.4.5-1, 1.4.5-2 ...)"
        required: true
        default: "1.4.5-1"

permissions:
  contents: write

jobs:
  patch_and_tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork (keep tools/)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote and fetch tags
        run: |
          set -eux
          git remote add upstream https://github.com/rustdesk/rustdesk.git || true
          git fetch --tags upstream

      - name: Create working branch from upstream tag
        run: |
          set -eux
          UP_TAG="${{ inputs.upstream_tag }}"
          # 支持输入 "1.4.5" 或 "v1.4.5"
          if git rev-parse "refs/tags/${UP_TAG}" >/dev/null 2>&1; then
            TAG_REF="refs/tags/${UP_TAG}"
          elif git rev-parse "refs/tags/v${UP_TAG}" >/dev/null 2>&1; then
            TAG_REF="refs/tags/v${UP_TAG}"
          else
            echo "Cannot find upstream tag: ${UP_TAG} or v${UP_TAG}"
            git tag -l | tail -n 30 || true
            exit 1
          fi

          BR="todd/${UP_TAG}"
          git checkout -B "${BR}" "${TAG_REF}"

      - name: Run patch script
        run: |
          set -eux
          ls -la tools || true
          python3 tools/patch_rustdesk_android.py --repo . --move-kotlin-dir \
            --old-package com.carriez.flutter_hbb --new-package com.celonis.work \
            --old-app-name RustDesk --new-app-name ToddDesk \
            --old-scheme rustdesk --new-scheme todddesk \
            --old-service InputService --new-service ToddService \
            --accessibility-desc "Made by Todd"

      - name: Write patch report (for you to review)
        run: |
          set -eux
          git status --porcelain
          git diff --stat > todd_patch_report.md
          git diff > todd_patch.diff
          echo "Report generated: todd_patch_report.md, todd_patch.diff"

      - name: Commit patch
        run: |
          set -eux
          git add -A
          git commit -m "Todd patch Android brand/package/service" || echo "Nothing to commit"

      - name: Create tag (to trigger official flutter-tag.yml build)
        run: |
          set -eux
          NEW_TAG="${{ inputs.new_tag }}"
          git tag -f "${NEW_TAG}"

      - name: Push branch + tag to your fork
        run: |
          set -eux
          BR="todd/${{ inputs.upstream_tag }}"
          git push origin "${BR}" --force
          git push origin "refs/tags/${{ inputs.new_tag }}" --force
